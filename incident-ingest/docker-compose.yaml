# SEC-5 WARNING: The credentials below are for LOCAL DEVELOPMENT ONLY.
# In staging / production you MUST override them via a secrets manager
# (e.g. Docker secrets, Vault, Doppler) and NEVER commit real passwords here.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: incident_ingest_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-incident_ingest}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: incident_ingest_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
